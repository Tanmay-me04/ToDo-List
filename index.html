<!doctype html>
<html lang="en">
  <head>
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <p>Todo List</p>
    <div class="grid-view">
      <input class="input-task input-task-css" placeholder="Todo Name" />

      <input class="input-time-js input-time" type="time" />

      <input class="input-date input-date-css" type="date" />

      <button class="add-button" onclick="addTodo()">Add</button>
    </div>

    <div class="todo-list-div todo-grid"></div>

    <script src="script.js"></script>
  </body>
</html>
